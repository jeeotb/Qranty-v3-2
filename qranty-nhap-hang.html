<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qranty — Nhập hàng</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./shared.css">
<style>
/* Manage branches link */
.qr-store-manage { display: flex; align-items: center; gap: 9px; padding: 8px 9px; border-radius: 6px; cursor: pointer; color: var(--n400); font-size: 12px; font-weight: 700; transition: all .13s ease; }
.qr-store-manage:hover { background: rgba(255,255,255,.06); color: #fff; }

/* Featured "Thao tác nhanh" nav item */
.nav-item.quick-action { background: linear-gradient(135deg, var(--brand), #3D7CB8); color: #fff; box-shadow: 0 4px 16px rgba(37,99,235,.5), inset 0 1px 0 rgba(255,255,255,.15); font-weight: 800; }
.nav-item.quick-action::before { display: none; }
.nav-item.quick-action .ni-box svg { color: #fff; }
.nav-item.quick-action:hover { background: linear-gradient(135deg, var(--brand), #3D7CB8); }

/* Outline-active nav item (e.g. Kho hàng & Linh kiện) */
.nav-item.outline-active { background: rgba(37,99,235,.12); border: 1px solid rgba(59,130,246,.45); color: #fff; }
.nav-item.outline-active .ni-box svg { color: #fff; }

/* Badge color variants */
.ni-badge.warn { background: var(--warning); }

/* Section divider */
.sb-divider { height: 1px; background: rgba(255,255,255,.06); margin: 8px 9px; }

/* Footer brand logo */
.qr-footer-icons { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 16px 8px; position: relative; z-index: 1; }
.qr-footer-icon-btn { width: 30px; height: 30px; border-radius: 6px; background: rgba(255,255,255,.06); display: flex; align-items: center; justify-content: center; color: var(--n400); cursor: pointer; transition: all .13s ease; }
.qr-footer-icon-btn:hover { background: rgba(255,255,255,.12); color: #fff; }
.qr-footer-brand { display: flex; align-items: center; justify-content: center; gap: 7px; padding: 4px 16px 14px; opacity: .55; position: relative; z-index: 1; }
.qr-footer-logo { width: 22px; height: 22px; border-radius: 4px; background: linear-gradient(145deg, var(--brand), var(--p800)); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.qr-footer-powered { color: var(--n500); font-size: 11px; font-weight: 600; letter-spacing: .02em; }

/* Account box (bottom of sidebar, Claude-style account menu) */
.sb-account { position: relative; padding: 8px 9px 10px; border-top: 1px solid rgba(255,255,255,.05); z-index: 10; }
.sb-account-trigger { display: flex; align-items: center; gap: 9px; width: 100%; padding: 7px 8px; border-radius: 6px; background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08); cursor: pointer; transition: all .13s ease; text-align: left; font-family: inherit; }
.sb-account-trigger:hover { background: rgba(255,255,255,.08); border-color: rgba(59,130,246,.5); }
.sb-account-trigger.open { background: #16243f; border-color: rgba(255,255,255,.08); border-bottom-left-radius: 0; border-bottom-right-radius: 0; box-shadow: 0 1px 0 #16243f; }
.sb-account-avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; background: linear-gradient(145deg, var(--brand), var(--brand-600)); box-shadow: 0 3px 8px rgba(37,99,235,.4); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; color: #fff; }
.sb-account-text { flex: 1 1 auto; min-width: 0; line-height: 1.25; }
.sb-account-name { color: #fff; font-weight: 800; font-size: 12.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sb-account-email { color: var(--n500); font-size: 10.5px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
.sb-account-chevron { flex: 0 0 auto; color: var(--n500); display: flex; transition: transform .16s ease; }
.sb-account-trigger.open .sb-account-chevron { transform: rotate(180deg); }

.sb-account-menu {
  position: absolute; left: 9px; right: 9px; bottom: 100%;
  background: #16243f; border: 1px solid rgba(255,255,255,.08); border-bottom: none;
  border-radius: 8px 8px 0 0;
  box-shadow: 0 -12px 28px rgba(0,0,0,.35); padding: 6px; z-index: 300;
  opacity: 0; visibility: hidden; transform: translateY(6px);
  transition: all .15s ease;
}
.sb-account-menu.open { opacity: 1; visibility: visible; transform: translateY(0); }
.sb-account-item { display: flex; align-items: center; gap: 10px; padding: 8px 9px; border-radius: 6px; cursor: pointer; color: var(--n400); font-size: 12.5px; font-weight: 700; text-decoration: none; transition: all .13s ease; }
.sb-account-item:hover { background: rgba(255,255,255,.06); color: #fff; }
.sb-account-item svg { width: 15px; height: 15px; flex-shrink: 0; }
.sb-account-divider { height: 1px; background: rgba(255,255,255,.07); margin: 6px 4px; }
.sb-account-item.logout { color: #f87171; }
.sb-account-item.logout:hover { background: rgba(248,113,113,.12); color: #f87171; }

/* Mode switcher: Cửa hàng vs Trung tâm bảo hành */
.sb-mode-switch { padding: 6px 9px 8px; }
.sb-mode-label { font-size: 9.5px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; color: var(--n500); margin-bottom: 6px; padding: 0 2px; }
.sb-mode-options { display: flex; background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08); border-radius: 8px; padding: 3px; gap: 2px; }
.sb-mode-opt { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 7px 4px; border-radius: 6px; border: none; background: transparent; color: var(--n400); font-size: 10px; font-weight: 700; cursor: pointer; transition: all .13s ease; text-align: center; line-height: 1.25; font-family: inherit; }
.sb-mode-opt svg { width: 16px; height: 16px; }
.sb-mode-opt:hover { color: #fff; }
.sb-mode-opt.active { background: #fff; color: var(--p700); box-shadow: 0 2px 6px rgba(0,0,0,.15); }

/* Hide finance-only UI unless "Cửa hàng" mode is active */
body:not(.mode-store) .fin-only { display: none !important; }

/* Collapsed sidebar: account box */
body.sb-collapsed .sb-account-text,
body.sb-collapsed .sb-account-chevron { display: none; }
body.sb-collapsed .sb-account-trigger { justify-content: center; padding: 7px; gap: 0; }
body.sb-collapsed .sb-account-trigger.open { border-radius: 6px; }
body.sb-collapsed .sb-account-menu { left: 8px; right: auto; width: 230px; border-radius: 8px; border-bottom: 1px solid rgba(255,255,255,.08); bottom: calc(100% + 6px); }
.ni-box svg { width: 16px; height: 16px; color: var(--n400); transition: color .13s ease; }
.nav-item.active .ni-box svg { color: #fff; }
.nav-item:hover .ni-box svg { color: #fff; }

/* Collapsed sidebar (LarkSuite-style icon rail) */
body.sb-collapsed .sidebar { width: var(--sidebar-w-collapsed); }
body.sb-collapsed .main { margin-left: var(--sidebar-w-collapsed); }
body.sb-collapsed .qr-store-text,
body.sb-collapsed .qr-store-chevron { display: none; }
body.sb-collapsed .qr-store-switcher { justify-content: center; padding: 8px; gap: 0; }
body.sb-collapsed .qr-store-menu { left: 8px; width: 250px; right: auto; border-radius: 8px; border-top: 1px solid rgba(255,255,255,.08); top: calc(100% + 6px); }
body.sb-collapsed .qr-store-switcher.open { border-radius: 8px; }
body.sb-collapsed .sb-group { display: none; }
body.sb-collapsed .sb-divider { margin: 8px 14px; }
body.sb-collapsed .nav-item { flex-direction: column; height: auto; min-height: 56px; padding: 8px 4px 7px; gap: 4px; justify-content: center; }
body.sb-collapsed .nav-item.active::before { top: 4px; bottom: 4px; }
body.sb-collapsed .ni-label { flex: none; font-size: 9.5px; font-weight: 600; text-align: center; line-height: 1.2; white-space: normal; }
body.sb-collapsed .ni-badge { position: absolute; top: 4px; right: 10px; font-size: 8.5px; padding: 1px 5px; }
body.sb-collapsed .qr-footer-icons { flex-wrap: wrap; padding: 12px 8px 8px; }
body.sb-collapsed .qr-footer-powered { display: none; }
body.sb-collapsed .qr-footer-brand { justify-content: center; padding: 4px 8px 14px; }

/* Top-right user menu */
.tb-user-wrap { position: relative; margin-left: 4px; }
.tb-user { display: flex; align-items: center; gap: 9px; padding: 5px 8px 5px 10px; border-radius: 999px; border: 1px solid transparent; background: transparent; cursor: pointer; transition: all .13s; font-family: inherit; }
.tb-user:hover, .tb-user.open { background: var(--n100); border-color: var(--n200); }
.tb-user-pro { display: inline-flex; align-items: center; height: 18px; padding: 0 8px; border-radius: 4px; font-size: 9.5px; font-weight: 800; letter-spacing: .06em; background: linear-gradient(135deg, var(--warning), #fb923c); color: #fff; box-shadow: 0 2px 6px rgba(245,158,11,.35); }
.tb-user-name { font-size: 12.5px; font-weight: 800; color: var(--text-1); white-space: nowrap; }
.tb-user-avatar { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; background: linear-gradient(145deg, var(--brand), var(--brand-600)); box-shadow: 0 3px 8px rgba(37,99,235,.35); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; color: #fff; }

.tb-user-menu {
  position: absolute; top: calc(100% + 10px); right: 0; width: 290px;
  background: #fff; border-radius: var(--r); border: 1px solid var(--n200);
  box-shadow: 0 16px 40px rgba(15,23,42,.18); overflow: hidden; z-index: 400;
  opacity: 0; visibility: hidden; transform: translateY(-8px);
  transition: all .15s ease;
}
.tb-user-menu.open { opacity: 1; visibility: visible; transform: translateY(0); }
.tb-user-menu-hdr { background: var(--n900); background-image: radial-gradient(ellipse at 30% 0%, rgba(37,99,235,.35) 0%, transparent 70%); padding: 18px 18px 16px; display: flex; align-items: center; gap: 12px; }
.tb-user-menu-avatar { width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0; background: linear-gradient(145deg, var(--brand), var(--brand-600)); box-shadow: 0 3px 10px rgba(37,99,235,.4); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 900; color: #fff; }
.tb-user-menu-name { font-size: 14px; font-weight: 800; color: #fff; }
.tb-user-menu-email { font-size: 11.5px; color: var(--n400); font-weight: 600; margin-top: 2px; }
.tb-user-menu-plan { display: inline-flex; align-items: center; height: 18px; padding: 0 8px; margin-top: 6px; border-radius: 4px; font-size: 9.5px; font-weight: 800; letter-spacing: .06em; background: rgba(255,255,255,.1); color: var(--n300); }
.tb-info-section { padding: 14px 18px 8px; }
.tb-info-title { font-size: 10px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; color: var(--text-4); margin-bottom: 8px; }
.tb-info-row { display: flex; align-items: center; justify-content: space-between; padding: 7px 0; font-size: 12.5px; font-weight: 700; border-bottom: 1px solid var(--n100); }
.tb-info-row:last-child { border-bottom: none; }
.tb-info-label { color: var(--text-4); font-weight: 600; }
.tb-info-value { color: var(--text-1); font-weight: 800; }
.tb-info-value.link { color: var(--p600); }
.tb-logout { display: flex; align-items: center; gap: 9px; padding: 12px 18px; border-top: 1px solid var(--n100); color: var(--error); font-size: 12.5px; font-weight: 800; cursor: pointer; transition: background .13s; }
.tb-logout:hover { background: var(--error-bg); }

/* GRID */
.qa-grid { display: grid; grid-template-columns: 1.7fr 1fr; gap: 16px; align-items: start; }

/* HERO PANEL */
.hero { background: linear-gradient(135deg, var(--p700) 0%, var(--p500) 60%, #60A5FA 100%); border-radius: var(--r); color: #fff; padding: 16px 20px; margin-bottom: 14px; }
.hero-title { display: flex; align-items: center; gap: 9px; font-size: 15px; font-weight: 900; }
.hero-sub { font-size: 11.5px; color: rgba(255,255,255,.8); font-weight: 600; margin-top: 3px; margin-left: 31px; }
.hero-icon { width: 26px; height: 26px; border-radius: 5px; background: rgba(255,255,255,.18); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

/* NOTICE */

/* FORM */
.field { margin-bottom: 14px; }
.field-label { font-size: 12px; font-weight: 600; color: var(--text-2); margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
.field-label .req { color: var(--error); }
.field-label .opt { font-size: 10.5px; font-weight: 700; color: var(--text-4); text-transform: none; }
.field-hint { font-size: 11px; color: var(--text-4); font-weight: 600; margin-top: 4px; }
.input {
  width: 100%; height: 38px; border: 1px solid var(--n200); border-radius: var(--r-sm);
  padding: 0 12px; font-size: 13px; font-family: inherit; font-weight: 600; color: var(--text-1);
  background: #fff; transition: border-color .13s, box-shadow .13s;
}
.input:focus { outline: none; border-color: var(--p500); box-shadow: 0 0 0 3px var(--s50); }
.input::placeholder { color: var(--n400); font-weight: 500; }
textarea.input { height: 70px; padding: 10px 12px; resize: vertical; font-family: inherit; }

.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

/* segmented toggle (serial mode) */
.seg { display: inline-flex; background: var(--n100); border-radius: 5px; padding: 2px; gap: 2px; margin-left: 4px; }
.seg-item { padding: 2px 10px; border-radius: 4px; font-size: 10.5px; font-weight: 700; color: var(--text-3); cursor: pointer; transition: all .13s; }
.seg-item.active { background: var(--p500); color: #fff; box-shadow: 0 1px 3px rgba(37,99,235,.35); }

/* serial + QR row */
.qa-serial-hdr { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 5px; }
.qa-serial-row { display: flex; align-items: center; gap: 8px; }
.qa-serial-row .input { flex: 1; min-width: 0; }
.qa-serial-row .input[readonly] { background: var(--n50); color: var(--text-2); font-weight: 700; letter-spacing: .02em; }
.qa-serial-regen { flex-shrink: 0; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--n200); border-radius: var(--r-sm); background: #fff; color: var(--p500); cursor: pointer; transition: all .13s; }
.qa-serial-regen:hover { background: var(--s50); border-color: var(--s200); }
.qa-serial-regen:active { transform: scale(.94); }

/* duration pills */
.dur-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.dur-pill { padding: 7px 16px; border-radius: var(--r-sm); border: 1px solid var(--n200); background: #fff; font-size: 12.5px; font-weight: 700; color: var(--text-2); cursor: pointer; transition: all .13s; }
.dur-pill:hover { border-color: var(--p500); color: var(--p600); }
.dur-pill.active { background: var(--p500); border-color: var(--p500); color: #fff; box-shadow: 0 3px 8px rgba(37,99,235,.3); }
.dur-or { font-size: 11px; color: var(--text-4); font-weight: 700; }
.dur-custom { width: 70px; }
.dur-unit { font-size: 12px; color: var(--text-3); font-weight: 700; }

/* search input with icon */
.input-icon-wrap { position: relative; }
.input-icon-wrap .input { padding-left: 36px; }
.input-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--n400); display: flex; }

.input-with-btn { display: flex; gap: 8px; }
.input-with-btn .input { flex: 1; }
.icon-btn-sq { width: 38px; height: 38px; border-radius: var(--r-sm); border: 1px solid var(--n200); background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--n500); transition: all .13s; flex-shrink: 0; }
.icon-btn-sq:hover { border-color: var(--brand); color: var(--brand); }

/* action row */
.action-row { display: flex; gap: 10px; margin-top: 18px; }
.action-row .btn-primary { flex: 1; }

/* recent activations list */
.recent-block { margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--n200); }
.recent-hdr { display: flex; align-items: center; gap: 8px; font-size: 12.5px; font-weight: 700; color: var(--text-2); margin-bottom: 10px; }
.recent-list { display: flex; flex-direction: column; gap: 8px; }
.recent-row { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: var(--r-sm); border: 1px solid var(--n100); transition: background .13s; }
.recent-row:hover { background: var(--n50); }
.recent-ico { width: 32px; height: 32px; border-radius: 6px; background: var(--s50); color: var(--p500); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.recent-info { flex: 1; min-width: 0; }
.recent-name { font-size: 12.5px; font-weight: 700; color: var(--text-1); }
.recent-sub { font-size: 11px; color: var(--text-4); font-weight: 600; margin-top: 1px; }
.recent-badge { font-size: 11px; font-weight: 800; color: var(--p600); background: var(--s50); padding: 3px 10px; border-radius: 10px; flex-shrink: 0; }

/* right column */
.side-card-hdr { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; color: var(--text-1); margin-bottom: 2px; }
.side-card-sub { font-size: 11px; color: var(--text-4); font-weight: 600; margin-bottom: 12px; }
.lookup-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; padding: 28px 10px; text-align: center; }
.lookup-empty-ico { width: 46px; height: 46px; border-radius: 50%; background: var(--n100); display: flex; align-items: center; justify-content: center; color: var(--n400); }
.lookup-empty-title { font-size: 12.5px; font-weight: 700; color: var(--text-2); }
.lookup-empty-sub { font-size: 11px; color: var(--text-4); font-weight: 600; }


/* AUTOCOMPLETE */
.ac-wrap { position: relative; }
.ac-dropdown {
  position: absolute; left: 0; right: 0; top: calc(100% + 4px);
  background: #fff; border: 1px solid var(--n200); border-radius: var(--r-sm);
  box-shadow: var(--shadow-hover); z-index: 50; overflow: hidden;
  display: none; max-height: 280px; overflow-y: auto;
}
.ac-dropdown.open { display: block; }
.ac-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; cursor: pointer; transition: background .12s; border-bottom: 1px solid var(--n100); }
.ac-item:last-child { border-bottom: none; }
.ac-item:hover, .ac-item.hi { background: var(--s50); }
.ac-item-ico { width: 28px; height: 28px; border-radius: 6px; background: var(--n100); color: var(--text-3); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.ac-item-text { flex: 1; min-width: 0; }
.ac-item-name { font-size: 12.5px; font-weight: 700; color: var(--text-1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ac-item-sub { font-size: 10.5px; color: var(--text-4); font-weight: 600; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ac-item-tag { font-size: 9.5px; font-weight: 800; padding: 2px 7px; border-radius: 8px; flex-shrink: 0; white-space: nowrap; }
.ac-item-tag.instock { background: var(--success-bg); color: #15803d; }
.ac-item-tag.nostock { background: var(--n100); color: var(--text-4); }
.ac-item.ac-new { color: var(--p600); font-weight: 800; font-size: 12.5px; }
.ac-item.ac-new .ac-item-ico { background: var(--s50); color: var(--p500); }
.ac-hint-row { padding: 7px 12px; font-size: 10.5px; color: var(--text-4); font-weight: 600; background: var(--n50); border-top: 1px solid var(--n100); }
.ac-hint-empty { padding: 16px 12px; text-align: center; font-size: 11.5px; color: var(--text-4); font-weight: 600; }

/* QR RESULT PANEL */
.qr-result { border-radius: var(--r); border: 1.5px solid var(--success); background: var(--success-bg); padding: 16px; margin-bottom: 16px; display: none; }
.qr-result.show { display: flex; gap: 16px; align-items: center; }
.qr-result.existing { border-color: var(--p500); background: var(--s50); }
.qr-result-img { width: 76px; height: 76px; border-radius: var(--r-sm); background: #fff; border: 1px solid var(--n200); display: flex; align-items: center; justify-content: center; flex-shrink: 0; padding: 8px; }
.qr-result-body { flex: 1; min-width: 0; }
.qr-result-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 800; padding: 2px 9px; border-radius: 10px; margin-bottom: 6px; background: var(--success); color: #fff; }
.qr-result.existing .qr-result-badge { background: var(--p500); }
.qr-result-title { font-size: 13.5px; font-weight: 800; color: var(--text-1); }
.qr-result-sub { font-size: 11.5px; color: var(--text-2); font-weight: 600; margin-top: 2px; line-height: 1.5; }
.qr-result-actions { display: flex; gap: 8px; flex-shrink: 0; }
.qr-result-btn { height: 34px; padding: 0 12px; border-radius: var(--r-sm); border: 1px solid var(--n200); background: #fff; font-size: 12px; font-weight: 700; color: var(--text-2); cursor: pointer; display: flex; align-items: center; gap: 6px; font-family: inherit; transition: all .13s; }
.qr-result-btn:hover { border-color: var(--p500); color: var(--p600); }


.tasks-card { margin-top: 16px; }
.task-row { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--n100); }
.task-row:last-child { border-bottom: none; }
.task-check { width: 18px; height: 18px; border-radius: 4px; border: 1.5px solid var(--n300); flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
.task-check.done { background: var(--success); border-color: var(--success); color: #fff; }
.task-info { flex: 1; min-width: 0; }
.task-title { font-size: 12.5px; font-weight: 700; color: var(--text-1); line-height: 1.4; }
.task-row.done .task-title { text-decoration: line-through; color: var(--text-4); }
.task-sub { font-size: 11px; color: var(--text-4); font-weight: 600; margin-top: 2px; }

<script>
function _randSerial() {
  var chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  var s = '';
  for (var i = 0; i < 11; i++) s += chars[Math.floor(Math.random() * chars.length)];
  return s;
}
function _genSerials(count, presetCodes, activeCount) {
  var arr = [];
  for (var i = 0; i < count; i++) {
    var code = (presetCodes && presetCodes[i]) || _randSerial();
    var isActive = i < activeCount;
    arr.push({
      code: code,
      status: isActive ? 'active' : 'pending',
      customerPhone: isActive ? '09' + Math.floor(10000000 + Math.random() * 89999999) : null
    });
  }
  return arr;
}

let _pnk = { rows: [], seq: 0 };

function pnkGenCode() {
  const now = new Date();
  const ym = now.getFullYear() + String(now.getMonth()+1).padStart(2,'0');
  const tail = String(Math.floor(Math.random()*900)+100);
  const code = 'PNK-' + ym + '-' + tail;
  const el = document.getElementById('pnkCode');
  if (el) el.textContent = code; // gán mã vào phiếu (trước đây chỉ trả về, không gán → mọi phiếu trùng mã)
  return code;
}

function pnkResetForm() {
  _pnk.rows = [];
  _pnk.seq  = 0;
  document.getElementById('pnkCode').textContent = pnkGenCode();
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('pnkDate').value = today;
  document.getElementById('pnkSupplier').value = '';
  document.getElementById('pnkNote').value = '';
  document.getElementById('pnkPaid').value = '';
  document.getElementById('pnkRemain').value = '';
  document.getElementById('pnkDebtBadge').style.display = 'none';
  document.getElementById('pnkTotal').textContent = '0đ';
  document.getElementById('pnkRowsBody').innerHTML = '';
  pnkAddRow();
  document.getElementById('pnkSupplier').focus();
}

// ── Row management ─────────────────────────────────────────────
function pnkAddRow() {
  const id = ++_pnk.seq;
  _pnk.rows.push({ id, name:'', sku:'', qty:1, costPrice:0, salePrice:0, genQR:false, existing:null, serials:[], warrantyDays:365 });
  const tbody = document.getElementById('pnkRowsBody');
  const tr = document.createElement('tr');
  tr.id = 'pnkRow-' + id;
  tr.innerHTML = `
    <td>
      <div class="pnk-item-name-wrap">
        <input class="pnk-input-sm" id="pnkName-${id}" placeholder="Tên sản phẩm..." autocomplete="off"
          oninput="pnkNameInput(${id})" onfocus="pnkNameFocus(${id})" onblur="pnkNameBlur(${id})">
        <div class="pnk-item-ac" id="pnkAC-${id}"></div>
      </div>
      <div class="pnk-qr-wrap" style="margin-top:5px">
        <label class="pnk-qr-toggle">
          <input type="checkbox" id="pnkQR-${id}" onchange="pnkToggleQR(${id})"> Tạo QR
        </label>
        <canvas class="pnk-qr-canvas" id="pnkQRCanvas-${id}" width="40" height="40"></canvas>
      </div>
    </td>
    <td><input class="pnk-input-sm" id="pnkSKU-${id}" placeholder="SKU..." oninput="pnkRowChanged(${id})"></td>
    <td>
      <input class="pnk-input-sm" id="pnkQty-${id}" type="number" value="1" min="1" style="width:60px" oninput="pnkRowChanged(${id})">
      <div style="margin-top:4px; font-size:10px;">
        <a href="javascript:void(0)" onclick="openPnkSerialOverlay(${id})" style="color:var(--brand,#2563eb); text-decoration:underline;">Serial & BH</a>
      </div>
    </td>
    <td><input class="pnk-input-sm" id="pnkCost-${id}" type="number" placeholder="0" min="0" oninput="pnkRowChanged(${id})"></td>
    <td><input class="pnk-input-sm" id="pnkSale-${id}" type="number" placeholder="0" min="0" oninput="pnkRowChanged(${id})"></td>
    <td>
      <button class="pnk-del-row" onclick="pnkDelRow(${id})">
        <svg width="12" height="12" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 4l10 10M14 4L4 14"/></svg>
      </button>
    </td>`;
  tbody.appendChild(tr);
}

function pnkDelRow(id) {
  _pnk.rows = _pnk.rows.filter(r => r.id !== id);
  const el = document.getElementById('pnkRow-' + id);
  if (el) el.remove();
  pnkUpdateTotal();
}

// ── Autocomplete ───────────────────────────────────────────────
function pnkNameInput(id) {
  const q = document.getElementById('pnkName-' + id).value;
  const row = _pnk.rows.find(r => r.id === id);
  if (row) row.name = q;
  pnkShowAC(id, q);
  pnkRowChanged(id);
}

function pnkNameFocus(id) {
  const q = document.getElementById('pnkName-' + id).value;
  pnkShowAC(id, q);
}

let _pnkACBlurTimer = {};
function pnkNameBlur(id) {
  _pnkACBlurTimer[id] = setTimeout(() => pnkHideAC(id), 180);
}

function pnkShowAC(id, q) {
  const ac = document.getElementById('pnkAC-' + id);
  const results = QrantyKho.searchProducts(q).slice(0, 6);
  if (!results.length && !q) { ac.classList.remove('open'); return; }
  let html = '';
  results.forEach(p => {
    html += `<div class="pnk-ac-item" onmousedown="pnkSelectProduct(${id}, '${p.sku}')">
      <span class="pnk-ac-item-name">${p.name}</span>
      <span class="pnk-ac-item-sub">SKU: ${p.sku} · Tồn: ${p.qty} · ${QrantyKho.fmtVND(p.salePrice)}</span>
    </div>`;
  });
  if (q) {
    html += `<div class="pnk-ac-item new-item" onmousedown="pnkSelectNew(${id}, '${q.replace(/'/g,"\\'")}')">
      <span class="pnk-ac-item-name">+ Tạo mới: "${q}"</span>
      <span class="pnk-ac-item-sub">Sản phẩm chưa có trong kho — sẽ tạo mới khi nhập</span>
    </div>`;
  }
  ac.innerHTML = html;
  ac.classList.add('open');
}

function pnkHideAC(id) {
  const ac = document.getElementById('pnkAC-' + id);
  if (ac) ac.classList.remove('open');
}

function pnkSelectProduct(id, sku) {
  clearTimeout(_pnkACBlurTimer[id]);
  const p = QrantyKho.getProduct(sku);
  if (!p) return;
  const row = _pnk.rows.find(r => r.id === id);
  if (row) { row.name = p.name; row.sku = p.sku; row.costPrice = p.costPrice; row.salePrice = p.salePrice; row.existing = p; }
  document.getElementById('pnkName-' + id).value = p.name;
  document.getElementById('pnkSKU-' + id).value = p.sku;
  document.getElementById('pnkCost-' + id).value = p.costPrice || '';
  document.getElementById('pnkSale-' + id).value = p.salePrice || '';
  pnkHideAC(id);
  pnkUpdateTotal();
  pnkToggleQR(id); // refresh QR if checked
}

function pnkSelectNew(id, name) {
  clearTimeout(_pnkACBlurTimer[id]);
  const row = _pnk.rows.find(r => r.id === id);
  if (row) { row.name = name; row.sku = ''; row.existing = null; }
  document.getElementById('pnkName-' + id).value = name;
  document.getElementById('pnkSKU-' + id).value = '';
  pnkHideAC(id);
}

// ── QR per row ─────────────────────────────────────────────────
function pnkToggleQR(id) {
  const chk = document.getElementById('pnkQR-' + id);
  const canvas = document.getElementById('pnkQRCanvas-' + id);
  if (!chk || !canvas) return;
  if (chk.checked) {
    const row = _pnk.rows.find(r => r.id === id);
    const seed = (row && row.sku) ? row.sku : (document.getElementById('pnkName-' + id).value || 'QR' + id);
    QrantyQR.draw(canvas, seed, 40);
    canvas.classList.add('show');
  } else {
    canvas.classList.remove('show');
  }
}

// ── Totals ─────────────────────────────────────────────────────
function pnkRowChanged(id) {
  const row = _pnk.rows.find(r => r.id === id);
  if (!row) return;
  row.qty       = parseInt(document.getElementById('pnkQty-' + id).value) || 1;
  row.costPrice = parseFloat(document.getElementById('pnkCost-' + id).value) || 0;
  row.salePrice = parseFloat(document.getElementById('pnkSale-' + id).value) || 0;
  row.sku       = document.getElementById('pnkSKU-' + id).value.trim();
  pnkUpdateTotal();
}

function pnkUpdateTotal() {
  const total = _pnk.rows.reduce((s, r) => s + r.qty * r.costPrice, 0);
  document.getElementById('pnkTotal').textContent = QrantyKho.fmtVND(total);
  pnkCalcDebt();
  pnkRenderPreview();
}

/* Xem trước phiếu nhập (cột phải) — cập nhật theo form bên trái */
function pnkRenderPreview() {
  var paper = document.getElementById('pnkPreview');
  if (!paper) return;
  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]; }); }
  var fmt = (typeof QrantyKho !== 'undefined') ? QrantyKho.fmtVND : function (n) { return (Number(n) || 0).toLocaleString('vi-VN') + 'đ'; };
  var g = function (id) { var e = document.getElementById(id); return e ? e.value : ''; };
  var code = (document.getElementById('pnkCode') || {}).textContent || '';
  var supplier = g('pnkSupplier').trim() || '—';
  var dateV = g('pnkDate');
  var note = g('pnkNote').trim();
  var rows = (_pnk && _pnk.rows) ? _pnk.rows.filter(function (r) { return r.name; }) : [];
  var total = rows.reduce(function (s, r) { return s + (Number(r.qty) || 0) * (Number(r.costPrice) || 0); }, 0);

  var html = '';
  html += '<div class="rcp-center"><div class="rcp-title">QRANTY</div><div class="rcp-sub">Phiếu nhập kho</div></div>';
  html += '<div class="rcp-center rcp-doctype">PHIẾU NHẬP KHO</div>';
  html += '<div class="rcp-divider"></div>';
  html += '<div class="rcp-row"><span class="rcp-label">Mã phiếu</span><span class="rcp-val">' + esc(code) + '</span></div>';
  html += '<div class="rcp-row"><span class="rcp-label">Nguồn nhập</span><span class="rcp-val">' + esc(supplier) + '</span></div>';
  if (dateV) html += '<div class="rcp-row"><span class="rcp-label">Ngày</span><span class="rcp-val">' + esc(dateV) + '</span></div>';
  html += '<div class="rcp-divider"></div>';
  if (!rows.length) {
    html += '<div class="rcp-item-sub" style="justify-content:center;color:#999">Chưa thêm hàng hóa</div>';
  } else {
    rows.forEach(function (r) {
      html += '<div class="rcp-item-name">' + esc(r.name) + '</div>';
      html += '<div class="rcp-item-sub"><span>SL: ' + (Number(r.qty) || 0) + '</span><span>' + fmt((Number(r.qty) || 0) * (Number(r.costPrice) || 0)) + '</span></div>';
    });
  }
  html += '<div class="rcp-divider"></div>';
  html += '<div class="rcp-total-row"><span>Tổng nhập</span><span>' + fmt(total) + '</span></div>';
  if (note) html += '<div class="rcp-divider"></div><div class="rcp-row"><span class="rcp-label">Ghi chú</span></div><div style="margin-top:2px">' + esc(note) + '</div>';
  html += '<div class="rcp-divider"></div><div class="rcp-thanks">Bản nháp — bấm "Xác nhận nhập kho" để lưu.</div>';
  paper.innerHTML = html;
}

function pnkCalcDebt() {
  const total = _pnk.rows.reduce((s, r) => s + r.qty * r.costPrice, 0);
  const paid  = parseFloat(document.getElementById('pnkPaid').value) || 0;
  const remain = Math.max(0, total - paid);
  document.getElementById('pnkRemain').value = remain > 0 ? remain.toLocaleString('vi-VN') : '0';
  const badge = document.getElementById('pnkDebtBadge');
  const txt   = document.getElementById('pnkDebtBadgeText');
  if (remain > 0) {
    badge.style.display = 'flex';
    badge.className = 'pnk-debt-strip ' + (paid > 0 ? 'partial' : 'debt');
    txt.textContent = 'Còn nợ ' + QrantyKho.fmtVND(remain) + ' → sẽ tạo công nợ nguồn nhập';
  } else {
    badge.style.display = 'none';
  }
}

// ── Confirm ────────────────────────────────────────────────────
function pnkConfirm() {
  const validRows = _pnk.rows.filter(r => r.name.trim() && r.qty > 0);
  if (!validRows.length) {
    alert('Vui lòng thêm ít nhất 1 sản phẩm.');
    return;
  }

  const supplier = document.getElementById('pnkSupplier').value.trim() || 'Nguồn nhập';
  const code     = document.getElementById('pnkCode').textContent;
  const note     = document.getElementById('pnkNote').value.trim();
  const category = document.getElementById('pnkCategory').value;
  const paid     = parseFloat(document.getElementById('pnkPaid').value) || 0;
  const total    = validRows.reduce((s, r) => s + r.qty * r.costPrice, 0);
  const remain   = Math.max(0, total - paid);

  const today = (() => {
    const d = new Date();
    return [String(d.getDate()).padStart(2,'0'), String(d.getMonth()+1).padStart(2,'0'), d.getFullYear()].join('/');
  })();

  // 1) Write each product row to kho-store
  validRows.forEach(r => {
    const sku = r.sku || QrantyKho.genSku(r.name);
    QrantyKho.addProduct({
      sku,
      name:         r.name,
      category:     category,
      brand:        '',
      unit:         'Cái',
      warrantyDays: r.warrantyDays !== undefined ? r.warrantyDays : 365,
      costPrice:    r.costPrice,
      salePrice:    r.salePrice || r.costPrice,
      qty:          r.qty,
      normalized:   false,
    });
  });

  // 1b) Thông báo dữ liệu mới
  if (window.Qranty) {
    var khTargets = [];
    validRows.forEach(function (r) {
      khTargets.push({ page: 'kho-hang', kind: 'product', data: {
        name: r.name, sku: r.sku || '', type: category, qty: r.qty, lot: code,
        cost: r.costPrice ? QrantyKho.fmtVND(r.costPrice) : '',
        price: r.salePrice ? QrantyKho.fmtVND(r.salePrice) : '' } });
      khTargets.push({ page: 'bao-hanh', kind: 'warranty', data: {
        sku: r.sku || '', product: r.name, customer: '', phone: '',
        start: today, end: '' } });
    });
    Qranty.push({ source: 'Nhập kho lô ' + code, targets: khTargets });
  }

  // 2) Save PNK record to history store → re-render tab Nhập kho & Lô hàng
  QrantyKho.addPNK({
    code:     code,
    supplier: supplier,
    date:     today,
    note:     note,
    items:    validRows.map(r => {
      const rSku = r.sku || QrantyKho.genSku(r.name);
      let serialsList = r.serials || [];
      if (serialsList.length === 0 && r.qty > 0) {
        serialsList = _genSerials(r.qty, [], 0);
      }
      return {
        name: r.name,
        sku: rSku,
        qty: r.qty,
        costPrice: r.costPrice,
        salePrice: r.salePrice || r.costPrice,
        warrantyDays: r.warrantyDays !== undefined ? r.warrantyDays : 365,
        serials: serialsList
      };
    }),
    total:    total,
    paid:     paid,
    remain:   remain,
  });
  // 2b) BƯỚC 1 — "1 phiếu = 1 lô": ghi phiếu này thành một LÔ (cùng mã) vào kho lô
  //     (qranty-lots) để tab "Lô hàng" bên Kho hàng hiện đúng + kích hoạt bảo hành theo serial.
  try {
    var lots = JSON.parse(localStorage.getItem('qranty-lots') || '[]');
    var lotSerials = [];
    validRows.forEach(function (r) {
      var preset = (r.serials || []).map(function (s) { return s.code || s; });
      _genSerials(r.qty || 0, preset, 0).forEach(function (s) { lotSerials.push(s); });
    });
    lots.unshift({
      id: code,
      name: supplier + (validRows[0] ? ' · ' + validRows[0].name : ''),
      warrantyText: (validRows[0] && validRows[0].warrantyDays ? validRows[0].warrantyDays + ' ngày' : '-'),
      serials: lotSerials
    });
    localStorage.setItem('qranty-lots', JSON.stringify(lots));
  } catch (e) {}

  // 3) Còn nợ → tạo công nợ nguồn nhập trong Thu chi
  if (typeof QrantyThuChi !== 'undefined' && total > 0) {
    QrantyThuChi.addEntry('chi', {
      name: supplier, code: code, amount: total, paid: paid, remain: remain,
      ref: note || validRows.map(function (r) { return r.name; }).join(', '),
      source: 'nhaphang', date: today
    });
  }

  // 4) Báo + reset form cho phiếu mới
  var _toast = document.querySelector('.apm-toast');
  var msg = '✓ Đã nhập kho — ' + validRows.length + ' sản phẩm · ' + QrantyKho.fmtVND(total) + ' (phiếu ' + code + ' = 1 lô)';
  if (_toast) { _toast.textContent = msg; _toast.classList.add('show'); setTimeout(function () { _toast.classList.remove('show'); }, 3200); }
  else { alert(msg); }
  _pnk.rows = [];
  document.getElementById('pnkRowsBody').innerHTML = '';
  ['pnkSupplier', 'pnkNote', 'pnkPaid'].forEach(function (id) { var e = document.getElementById(id); if (e) e.value = ''; });
  pnkGenCode();
  pnkAddRow();
  pnkUpdateTotal();
}

// (Trang riêng — không có overlay để đóng bằng Esc)

/* ════════ FORM NHẬP KHO dạng card (mỗi SP danh mục/xuất xứ riêng) ════════ */
function nkEsc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]; }); }
function _nkToISO() { var d = new Date(); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
function _nkToday() { var d = new Date(); return [String(d.getDate()).padStart(2,'0'), String(d.getMonth()+1).padStart(2,'0'), d.getFullYear()].join('/'); }
function _nkFmtDate(iso) { if (!iso) return _nkToday(); var p = iso.split('-'); return p.length === 3 ? p[2]+'/'+p[1]+'/'+p[0] : _nkToday(); }
function _nkDateToISO(s) { if (!s) return _nkToISO(); var p = String(s).split('/'); return p.length === 3 ? p[2]+'-'+p[1]+'-'+p[0] : _nkToISO(); }
function _nkGenCode() { var n = new Date(); return 'PNK-' + n.getFullYear() + String(n.getMonth()+1).padStart(2,'0') + '-' + String(Math.floor(Math.random()*900)+100); }
var _nkEditCode = null;
function nkRefreshCatList() {
  var dl = document.getElementById('khCatDatalist'); if (!dl) return;
  var cats = {};
  QrantyKho.getData().forEach(function (p) { var c = (p.category || '').trim(); if (c) cats[c] = 1; });
  (QrantyKho.getCategories ? QrantyKho.getCategories() : []).forEach(function (c) { if (c) cats[c] = 1; });
  dl.innerHTML = Object.keys(cats).map(function (c) { return '<option value="' + nkEsc(c) + '">'; }).join('');
}
function nkSerialCount(ta) { var n = ta.value.split('\n').map(function (s) { return s.trim(); }).filter(Boolean).length; var el = ta.closest('.nk-row').querySelector('.nk-serial-count'); if (el) el.textContent = n; }
function nkGenRowSerials(row) { var q = parseInt(row.querySelector('.nk-qty').value, 10) || 0, a = []; for (var i = 0; i < q; i++) a.push(_randSerial()); var ta = row.querySelector('.nk-serials'); ta.value = a.join('\n'); nkSerialCount(ta); }
function nkGenSerials(btn) { nkGenRowSerials(btn.closest('.nk-row')); }
function nkSetSerialMode(btn, mode) { var row = btn.closest('.nk-row'); row.querySelectorAll('.nk-seg').forEach(function (s) { s.classList.toggle('active', s.dataset.mode === mode); }); row.dataset.serialMode = mode; var ta = row.querySelector('.nk-serials'); if (mode === 'auto') { ta.readOnly = true; nkGenRowSerials(row); } else { ta.readOnly = false; ta.focus(); } }
function nkSyncSerials(qi) { var row = qi.closest('.nk-row'); if ((row.dataset.serialMode || 'auto') === 'auto') nkGenRowSerials(row); nkUpdateTotal(); }
function nkToggleExtra(btn) { var ex = btn.nextElementSibling; var show = ex.style.display === 'none'; ex.style.display = show ? '' : 'none'; btn.textContent = show ? '− Ẩn trường chi tiết' : '+ Thêm trường (thương hiệu, xuất xứ, đơn vị, SKU)'; }
/* chip mô tả + gợi ý theo danh mục */
function nkAddChip(row, text) {
  text = (text || '').trim(); if (!text) return;
  var box = row.querySelector('.nk-chipbox'), inp = row.querySelector('.nk-chipentry');
  var dup = Array.prototype.some.call(box.querySelectorAll('.chip-label'), function (c) { return c.textContent.toLowerCase() === text.toLowerCase(); });
  if (dup) return;
  var chip = document.createElement('span'); chip.className = 'chip';
  chip.innerHTML = '<span class="chip-label"></span><button type="button" class="chip-x" onclick="this.parentNode.remove()">&times;</button>';
  chip.querySelector('.chip-label').textContent = text;
  box.insertBefore(chip, inp);
}
function nkChipKey(e) {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault(); var v = e.target.value.trim();
    if (v) { var row = e.target.closest('.nk-row'); nkAddChip(row, v); var cat = row.querySelector('.nk-cat').value.trim(); if (cat && QrantyKho.addCatTagDef) { QrantyKho.addCatTagDef(cat, v); nkRenderSuggest(row); } }
    e.target.value = '';
  } else if (e.key === 'Backspace' && !e.target.value) { var chips = e.target.closest('.nk-chipbox').querySelectorAll('.chip'); if (chips.length) chips[chips.length - 1].remove(); }
}
function nkChipCollect(row) { return Array.prototype.map.call(row.querySelectorAll('.nk-chipbox .chip-label'), function (c) { return c.textContent; }); }
function nkRenderSuggest(row) {
  var box = row.querySelector('.nk-sug'); if (!box) return;
  var cat = row.querySelector('.nk-cat').value.trim();
  var tags = (cat && QrantyKho.getCatTagDefs) ? QrantyKho.getCatTagDefs(cat) : [];
  var html = tags.map(function (t) { return '<span class="chip-sug"><button type="button" class="chip-sug-add" onclick="nkSugClick(this)">+ ' + nkEsc(t) + '</button><button type="button" class="chip-sug-del" onclick="nkSugRemove(event,this)">&times;</button></span>'; }).join('');
  html += '<span style="font-size:10.5px;color:var(--text-4)">' + (cat ? 'gợi ý cho "' + nkEsc(cat) + '"' : 'chọn danh mục để có gợi ý thẻ') + '</span>';
  box.innerHTML = html;
}
function nkSugClick(b) { var row = b.closest('.nk-row'); nkAddChip(row, b.textContent.replace(/^\+\s*/, '').trim()); }
function nkSugRemove(ev, x) { ev.stopPropagation(); var row = x.closest('.nk-row'); var t = x.closest('.chip-sug').querySelector('.chip-sug-add').textContent.replace(/^\+\s*/, '').trim(); var cat = row.querySelector('.nk-cat').value.trim(); if (cat && QrantyKho.removeCatTagDef) QrantyKho.removeCatTagDef(cat, t); nkRenderSuggest(row); }
function nkCatChanged(inp) { nkRenderSuggest(inp.closest('.nk-row')); }
function nkAddRow(data) {
  var body = document.getElementById('nkRowsBody'); if (!body) return;
  data = (data && typeof data === 'object' && !data.target) ? data : {};
  var row = document.createElement('div'); row.className = 'nk-row';
  if (data.sku) row.dataset.sku = data.sku;
  row.dataset.serialMode = data.serialMode || 'auto';

      '<input class="input nk-cat" list="khCatDatalist" placeholder="Danh mục" value="' + nkEsc(data.cat || '') + '" oninput="nkCatChanged(this)">' +

    '</div>' +
    '<div class="nk-row-grid">' +
      '<div><label>Số lượng</label><input class="input nk-qty" type="number" min="1" value="' + (data.qty != null ? data.qty : 1) + '" oninput="nkSyncSerials(this)"></div>' +
      '<div><label>Giá nhập</label><input class="input nk-cost" type="number" min="0" value="' + (data.cost != null ? data.cost : '') + '" oninput="nkUpdateTotal()"></div>' +
      '<div><label>Giá bán</label><input class="input nk-sale" type="number" min="0" value="' + (data.sale != null ? data.sale : '') + '"></div>' +
      '<div><label>Bảo hành (ngày)</label><input class="input nk-wty" type="number" min="0" value="' + (data.wty != null ? data.wty : 365) + '"></div>' +
    '</div>' +
    '<div class="nk-desc-wrap"><label>Thẻ mô tả (Enter để tạo)</label><div class="nk-sug"></div>' +
      '<div class="chip-input nk-chipbox" onclick="this.querySelector(\'.nk-chipentry\').focus()"><input class="chip-entry nk-chipentry" placeholder="Nhập rồi Enter…" onkeydown="nkChipKey(event)"></div></div>' +
    '<button type="button" class="nk-more-btn" onclick="nkToggleExtra(this)">' + (hasExtra ? '− Ẩn trường chi tiết' : '+ Thêm trường (thương hiệu, xuất xứ, đơn vị, SKU)') + '</button>' +
    '<div class="nk-extra" style="' + (hasExtra ? '' : 'display:none') + '"><div class="nk-row-grid">' +
      '<div><label>Thương hiệu</label><input class="input nk-brand" value="' + nkEsc(data.brand || '') + '"></div>' +
      '<div><label>Xuất xứ</label><input class="input nk-origin" value="' + nkEsc(data.origin || '') + '"></div>' +
      '<div><label>Đơn vị</label><input class="input nk-unit" placeholder="Chiếc" value="' + nkEsc(data.unit || '') + '"></div>' +
      '<div><label>SKU (trống = tự sinh)</label><input class="input nk-skuman" value="' + nkEsc(data.skuManual || '') + '"></div>' +
    '</div></div>' +
    '<div class="nk-row-serial"><div class="nk-serial-hdr"><span>Serial (<span class="nk-serial-count">0</span>)</span>' +
      '<span class="nk-serial-mode">' +
        '<button type="button" class="nk-seg' + (man ? '' : ' active') + '" data-mode="auto" onclick="nkSetSerialMode(this,\'auto\')">Tự động</button>' +
        '<button type="button" class="nk-seg' + (man ? ' active' : '') + '" data-mode="manual" onclick="nkSetSerialMode(this,\'manual\')">Thủ công</button>' +
        '<button type="button" class="btn-outline-xs" onclick="nkGenSerials(this)" title="Sinh lại">&#8635; Sinh</button>' +
      '</span></div>' +
      '<textarea class="input nk-serials" rows="2" placeholder="Mỗi serial 1 dòng" oninput="nkSerialCount(this)"' + (man ? '' : ' readonly') + '>' + nkEsc(data.serials || '') + '</textarea></div>';
  body.appendChild(row);
  if (data.specs) data.specs.forEach(function (s) { nkAddChip(row, s); });
  nkRenderSuggest(row);
  if (!data.serials && (row.dataset.serialMode || 'auto') === 'auto') nkGenRowSerials(row);
  else nkSerialCount(row.querySelector('.nk-serials'));
}
function nkRemoveRow(btn) { var r = btn.closest('.nk-row'); if (r) r.remove(); nkUpdateTotal(); }
function nkUpdateTotal() {
  var total = 0;
  document.querySelectorAll('#nkRowsBody .nk-row').forEach(function (r) { total += (parseFloat(r.querySelector('.nk-qty').value) || 0) * (parseFloat(r.querySelector('.nk-cost').value) || 0); });
  var paid = parseFloat(document.getElementById('nkPaid').value) || 0;
  document.getElementById('nkTotal').textContent = QrantyKho.fmtVND(total);
  document.getElementById('nkRemain').textContent = QrantyKho.fmtVND(Math.max(0, total - paid));
}
function _nkParseSerials(text, qty) { var c = (text || '').split('\n').map(function (s) { return s.trim(); }).filter(Boolean); while (c.length < qty) c.push(_randSerial()); return c.map(function (x) { return { code: x, status: 'pending', customerPhone: null }; }); }
function _nkUpdatePNK(code, patch) { var list = QrantyKho.getPNKList(); var i = list.findIndex(function (p) { return p.code === code; }); if (i < 0) return; Object.assign(list[i], patch); localStorage.setItem('qranty-pnk-history', JSON.stringify(list)); }
function _nkUpdateThuChi(code, patch) { if (typeof QrantyThuChi === 'undefined' || !QrantyThuChi.getData) return; var d = QrantyThuChi.getData(); var e = (d.chi || []).find(function (x) { return x.code === code; }); if (e) { Object.assign(e, patch); if (QrantyThuChi.save) QrantyThuChi.save(d); } }
function nkLoadEdit(code) {
  var p = QrantyKho.getPNKList().find(function (x) { return x.code === code; });
  if (!p) { document.getElementById('nkCode').textContent = _nkGenCode(); nkAddRow(); nkUpdateTotal(); return; }
  _nkEditCode = code;
  document.getElementById('nkTitle').textContent = 'Sửa phiếu nhập kho';
  document.getElementById('nkConfirmLabel').textContent = 'Lưu thay đổi';
  document.getElementById('nkCode').textContent = code;
  document.getElementById('nkSupplier').value = p.supplier || '';
  document.getElementById('nkNote').value = p.note || '';
  document.getElementById('nkPaid').value = p.paid || 0;
  document.getElementById('nkDate').value = _nkDateToISO(p.date);
  (p.items || []).forEach(function (it) {
    var prod = QrantyKho.getProduct(it.sku);
    var cat = it.category || (prod ? prod.category : '') || '';
    var specs = (prod && prod.customFields && Array.isArray(prod.customFields.specs)) ? prod.customFields.specs : [];
    nkAddRow({ name: it.name, cat: cat, qty: it.qty, cost: it.costPrice, sale: it.salePrice, wty: it.warrantyDays, sku: it.sku, serials: (it.serials || []).map(function (s) { return s.code || s; }).join('\n'), serialMode: 'manual', specs: specs, brand: prod ? prod.brand : '', origin: prod ? prod.origin : '', unit: prod ? prod.unit : '' });
  });
  if (!(p.items || []).length) nkAddRow();
  nkUpdateTotal();
}
function nkConfirm() {
  var rows = [];
  document.querySelectorAll('#nkRowsBody .nk-row').forEach(function (r) {
    var name = r.querySelector('.nk-name').value.trim();
    var qty = parseInt(r.querySelector('.nk-qty').value, 10) || 0;
    if (!name || qty <= 0) return;
    rows.push({ name: name, cat: r.querySelector('.nk-cat').value.trim(), qty: qty,
      cost: parseFloat(r.querySelector('.nk-cost').value) || 0, sale: parseFloat(r.querySelector('.nk-sale').value) || 0,
      wty: (function () { var w = parseInt(r.querySelector('.nk-wty').value, 10); return isNaN(w) ? 365 : w; })(),
      brand: r.querySelector('.nk-brand').value.trim(), origin: r.querySelector('.nk-origin').value.trim(), unit: r.querySelector('.nk-unit').value.trim() || 'Cái',
      skuManual: r.querySelector('.nk-skuman').value.trim(), specs: nkChipCollect(r),
      serialText: r.querySelector('.nk-serials').value, sku: r.dataset.sku || '' });
  });
  if (!rows.length) { alert('Thêm ít nhất 1 sản phẩm có tên và số lượng.'); return; }
  var supplier = document.getElementById('nkSupplier').value.trim() || 'Nguồn nhập';
  var note = document.getElementById('nkNote').value.trim();
  var paid = parseFloat(document.getElementById('nkPaid').value) || 0;
  var code = document.getElementById('nkCode').textContent;
  var date = _nkFmtDate(document.getElementById('nkDate').value);
  var total = rows.reduce(function (s, r) { return s + r.qty * r.cost; }, 0);
  var remain = Math.max(0, total - paid);
  rows.forEach(function (r) { if (r.cat && QrantyKho.addCategory) QrantyKho.addCategory(r.cat); });

  if (_nkEditCode) {
    var oldPnk = QrantyKho.getPNKList().find(function (p) { return p.code === _nkEditCode; }) || { items: [] };
    var oldBySku = {}; (oldPnk.items || []).forEach(function (it) { oldBySku[it.sku] = it; });
    var newSkus = {};
    rows.forEach(function (r) {
      if (!r.sku) r.sku = r.skuManual || QrantyKho.genSku(r.name);
      newSkus[r.sku] = true;
      var oldQty = oldBySku[r.sku] ? (oldBySku[r.sku].qty || 0) : 0;
      if (QrantyKho.getProduct(r.sku)) {
        QrantyKho.updateProduct(r.sku, { name: r.name, category: r.cat || undefined, brand: r.brand, origin: r.origin, unit: r.unit, costPrice: r.cost, salePrice: r.sale || r.cost, warrantyDays: r.wty, customFields: { specs: r.specs } });
        if (r.qty !== oldQty) QrantyKho.updateStock(r.sku, r.qty - oldQty);
      } else {
        QrantyKho.addProduct({ sku: r.sku, name: r.name, category: r.cat, brand: r.brand, origin: r.origin, unit: r.unit, warrantyDays: r.wty, costPrice: r.cost, salePrice: r.sale || r.cost, qty: r.qty, normalized: false, customFields: { specs: r.specs } });
      }
    });
    (oldPnk.items || []).forEach(function (it) { if (!newSkus[it.sku] && QrantyKho.getProduct(it.sku)) QrantyKho.updateStock(it.sku, -(it.qty || 0)); });
    var items = rows.map(function (r) { var oi = oldBySku[r.sku], serials = _nkParseSerials(r.serialText, r.qty); if (oi && oi.serials) { var om = {}; oi.serials.forEach(function (s) { om[s.code] = s; }); serials = serials.map(function (s) { return om[s.code] || s; }); } return { name: r.name, sku: r.sku, category: r.cat, qty: r.qty, costPrice: r.cost, salePrice: r.sale || r.cost, warrantyDays: r.wty, serials: serials }; });
    _nkUpdatePNK(_nkEditCode, { supplier: supplier, date: date, note: note, items: items, total: total, paid: paid, remain: remain });
    _nkUpdateThuChi(_nkEditCode, { name: supplier, amount: total, paid: paid, remain: remain, ref: note || rows.map(function (r) { return r.name; }).join(', ') });
    if (window.QrantySupplier && supplier && supplier !== 'Nguồn nhập') QrantySupplier.upsert({ name: supplier });
  } else {
    rows.forEach(function (r) { r._sku = r.skuManual || QrantyKho.genSku(r.name); QrantyKho.addProduct({ sku: r._sku, name: r.name, category: r.cat, brand: r.brand, origin: r.origin, unit: r.unit, warrantyDays: r.wty, costPrice: r.cost, salePrice: r.sale || r.cost, qty: r.qty, normalized: false, customFields: { specs: r.specs } }); });
    QrantyKho.addPNK({ code: code, supplier: supplier, date: date, note: note, items: rows.map(function (r) { return { name: r.name, sku: r._sku, category: r.cat, qty: r.qty, costPrice: r.cost, salePrice: r.sale || r.cost, warrantyDays: r.wty, serials: _nkParseSerials(r.serialText, r.qty) }; }), total: total, paid: paid, remain: remain });
    if (typeof QrantyThuChi !== 'undefined' && total > 0) QrantyThuChi.addEntry('chi', { name: supplier, code: code, amount: total, paid: paid, remain: remain, ref: note || rows.map(function (r) { return r.name; }).join(', '), source: 'nhaphang', date: date });
    if (window.QrantySupplier && supplier && supplier !== 'Nguồn nhập') QrantySupplier.upsert({ name: supplier });
    if (window.Qranty) { var t = []; rows.forEach(function (r) { t.push({ page: 'kho-hang', kind: 'product', data: { name: r.name, sku: r._sku, type: r.cat, qty: r.qty, lot: code, cost: r.cost ? QrantyKho.fmtVND(r.cost) : '', price: (r.sale || r.cost) ? QrantyKho.fmtVND(r.sale || r.cost) : '' } }); }); Qranty.push({ source: 'Nhập kho phiếu ' + code, targets: t }); }
  }
  try { sessionStorage.setItem('qrantyNewPNK', '1'); } catch (e) {}
  window.location.href = './qranty-kho-hang-v2.html#lohang';
}

function _nkFillSupplierList() {

  }).join('');
}

<style>

<script>
function _nkReceiptRows() {
  var rows = [];
  document.querySelectorAll('#nkRowsBody .nk-row').forEach(function (r) {
    var name = r.querySelector('.nk-name').value.trim();
    var qty = parseInt(r.querySelector('.nk-qty').value, 10) || 0;
    if (!name || qty <= 0) return;
    rows.push({ name: name, qty: qty, cost: parseFloat(r.querySelector('.nk-cost').value) || 0 });
  });
  return rows;
}
function nkOpenReceipt() {
  var paper = document.getElementById('receiptPaper');
  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]; }); }
  var fmt = (typeof QrantyKho !== 'undefined') ? QrantyKho.fmtVND : function (n) { return (Number(n) || 0).toLocaleString('vi-VN') + 'đ'; };
  var code = (document.getElementById('nkCode') || {}).textContent || '';
  var supplier = (document.getElementById('nkSupplier').value || '').trim() || '—';
  var dateV = _nkFmtDate(document.getElementById('nkDate').value);
  var note = (document.getElementById('nkNote').value || '').trim();
  var paid = parseFloat(document.getElementById('nkPaid').value) || 0;
  var rows = _nkReceiptRows();
  var total = rows.reduce(function (s, r) { return s + r.qty * r.cost; }, 0);
  var remain = Math.max(0, total - paid);

  // Nhiều sản phẩm → khổ A5 cho đỡ dài (giống phiếu bán hàng)
  paper.classList.toggle('a5', rows.length > 4);

  var html = '';
  html += '<div class="rcp-center"><div class="rcp-title">QRANTY</div><div class="rcp-sub">Cửa hàng demo · 0900 000 000</div></div>';
  html += '<div class="rcp-center rcp-doctype">PHIẾU NHẬP KHO</div>';
  html += '<div class="rcp-divider"></div>';
  html += '<div class="rcp-row"><span class="rcp-label">Mã phiếu</span><span class="rcp-val">' + esc(code) + '</span></div>';
  html += '<div class="rcp-row"><span class="rcp-label">Nguồn nhập</span><span class="rcp-val">' + esc(supplier) + '</span></div>';
  if (dateV) html += '<div class="rcp-row"><span class="rcp-label">Ngày nhập</span><span class="rcp-val">' + esc(dateV) + '</span></div>';
  html += '<div class="rcp-divider"></div>';
  if (!rows.length) {
    html += '<div class="rcp-item-sub" style="justify-content:center;color:#999">Chưa thêm hàng hóa</div>';
  } else {
    rows.forEach(function (r) {
      html += '<div class="rcp-item-name">' + esc(r.name) + '</div>';
      html += '<div class="rcp-item-sub"><span>SL ' + r.qty + ' × ' + fmt(r.cost) + '</span><span>' + fmt(r.qty * r.cost) + '</span></div>';
    });
  }
  html += '<div class="rcp-divider"></div>';
  html += '<div class="rcp-total-row"><span>Tổng nhập</span><span>' + fmt(total) + '</span></div>';
  html += '<div class="rcp-row"><span class="rcp-label">Đã trả</span><span class="rcp-val">' + fmt(paid) + '</span></div>';
  if (remain > 0) html += '<div class="rcp-remain-row"><span>Còn nợ NCC</span><span>' + fmt(remain) + '</span></div>';
  if (note) { html += '<div class="rcp-divider"></div><div class="rcp-row"><span class="rcp-label">Ghi chú</span></div><div style="margin-top:2px">' + esc(note) + '</div>'; }
  html += '<div class="rcp-divider"></div>';
  if (typeof QrantyQR !== 'undefined' && code) {
    html += '<div class="rcp-qr-wrap"><canvas id="nkReceiptQr" width="90" height="90"></canvas><div class="rcp-qr-code">' + esc(code) + '</div></div>';
  }

  document.getElementById('nkReceiptModal').classList.add('open');
  var canvas = document.getElementById('nkReceiptQr');
  if (canvas && typeof QrantyQR !== 'undefined') QrantyQR.draw(canvas, QrantyQR.hash ? QrantyQR.hash(code) : code.length, 90);
}
function nkCloseReceipt() { document.getElementById('nkReceiptModal').classList.remove('open'); }
function nkPrintReceipt() { window.print(); }
document.addEventListener('keydown', function (e) { if (e.key === 'Escape') nkCloseReceipt(); });
</script>
